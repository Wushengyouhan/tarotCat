# push 到 main：构建镜像 → 推送阿里云 ACR → SSH 服务器自动部署
# 只需在仓库 Settings → Secrets and variables → Actions 中配置 1 个 Secret：
#   SSH_PASSWORD   服务器 root 密码
# （ACR 相关 Secret 如已配好则无需改动）

name: Build, Push & Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_TAG_LATEST: latest

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Docker metadata
        id: meta
        run: |
          REG="${{ secrets.ACR_REGISTRY }}"
          NS="${{ secrets.ACR_NAMESPACE }}"
          REPO="${{ secrets.ACR_REPOSITORY }}"
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "image_base=${REG}/${NS}/${REPO}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_base }}:${{ env.IMAGE_TAG_LATEST }}
            ${{ steps.meta.outputs.image_base }}:${{ steps.meta.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 139.196.30.138
          username: root
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /root/tarotcat
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
